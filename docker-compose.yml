services:
  html-fetcher:
    build: .
    container_name: html-fetcher
    restart: unless-stopped
    ports:
      - "3330:3330"
    environment:
      - HOST=0.0.0.0
      - PORT=3330
      # the URL path under which the service will be served. Defaults to "" (root path)
      - ROOT_PATH=/html-fetcher
      # the directory where camoufox, zendriver and cache data will be stored. Defaults to /data
      - DATA_DIR=/data
      # Optional: disable Zendriver (AGPL-3.0 licensed) - uncomment to disable
      #- FETCH_USE_ZENDRIVER=0
    volumes:
      - html_fetcher_data:/data

volumes:
  html_fetcher_data:
