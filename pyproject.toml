[build-system]
requires = ["setuptools>=69", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "html-fetcher"
dynamic = ["version"]  # tell setuptools the version comes from elsewhere
description = "Retrieves web page HTML while bypassing common bot detection systems including Cloudfront, Cloudflare, Akamai, and select DataDome configurations"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "camoufox>=0.4.0",
    "curl-cffi>=0.15.0",
    "fastapi>=0.136.0",
    "pydantic>=2.13.3",
    "uvicorn>=0.45.0",
    "zendriver>=0.15.3",
]

[tool.setuptools_scm]
fallback_version = "0.5.0"
write_to = "src/_version.py"   # auto-generated file

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "respx>=0.23.1",
    "setuptools-scm>=10.0.5"
]
